[workspace]
members = ["packages/core-wasm"]
resolver = "2"

# Workspace-level dependency versions to keep crates in sync
[workspace.dependencies]
wasm-bindgen = "0.2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
console_error_panic_hook = "0.1"
candle-core = "0.8"
candle-nn = "0.8"
candle-transformers = "0.8"
tokenizers = { version = "0.21.0", default-features = false, features = ["fancy-regex"] }
rand = "0.9"

# Wasm release profile: optimize for binary size, not speed.
# The model inference is the bottleneck — not Rust execution.
[profile.release]
opt-level = "z"
lto = "fat"
codegen-units = 1
panic = "abort"
strip = true

[profile.dev]
opt-level = 0
debug = true

# Optimize dependencies even in dev builds — critical for candle inference speed during development
[profile.dev.package."*"]
opt-level = 3
