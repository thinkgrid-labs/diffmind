[package]
name = "core-engine"
version = "0.7.0"
edition = "2024"
description = "Diffmind shared AI engine core"

[dependencies]
candle-core = { workspace = true }
candle-nn = { workspace = true }
candle-transformers = { workspace = true }
tokenizers = { workspace = true }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
thiserror = "2.0.18"
log = "0.4"
rand = { workspace = true }

# On macOS, enable Metal (Apple Silicon GPU) and Accelerate (CPU BLAS).
# Cargo merges features — these are additive on top of the workspace dep.
[target.'cfg(target_os = "macos")'.dependencies]
candle-core = { version = "0.10.2", features = ["metal", "accelerate"] }
candle-nn = { version = "0.10.2", features = ["metal", "accelerate"] }
candle-transformers = { version = "0.10.2", features = ["metal"] }
