[package]
name = "core-wasm"
version = "0.2.0"
edition = "2021"
description = "diffmind Wasm core — on-device security analysis via Qwen2.5-Coder"

[package.metadata.wasm-pack.profile.release]
wasm-opt = false

# cdylib: produces the .wasm binary for consumption by JS hosts
# rlib: allows native Rust tests (cargo test) to run without wasm target
[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
wasm-bindgen = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
getrandom = { version = "0.3", features = ["wasm_js"] }
console_error_panic_hook = { workspace = true, optional = true }

# Phase 2: candle inference engine
candle-core = { workspace = true }
candle-nn = { workspace = true }
candle-transformers = { workspace = true }
tokenizers = { workspace = true }

[features]
# Enable panic hook in development for better error messages in browser console / Node
default = ["console_error_panic_hook"]

[dev-dependencies]
wasm-bindgen-test = "0.3"
