[package]
name = "core-native"
version = "0.4.8"
edition = "2021"

[lib]
crate-type = ["cdylib"]

[dependencies]
napi = { version = "2.12.2", features = ["async", "serde-json"] }
napi-derive = "2.12.2"
core-engine = { path = "../core-engine" }
serde = { workspace = true }
serde_json = { workspace = true }

[build-dependencies]
napi-build = "2.0.1"
